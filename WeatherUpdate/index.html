<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Wellenreiten</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
		<link href="index.css" rel="stylesheet" type="text/css">
  	</head>
  	<body>
    	<div class="container text-center ">
			<div class="row main">
				<div class="col-md-12 col-xl-12">
					<h1>Surf Esteem  <small> 0.1</small></h1>
					<h6><small><i>"Conversation about the waves is the last refuge of the unimaginative" </i>-Oscar Milde</small></h6>
					<h6 style="color:red;"><small>*some features are not yet available</small></h6>
				</div>
			</div>
			<div class="row main">
				<div class="col-xl-6 col-md-12">					
					<div class="row">
						<div class="col-md-12 col-xl-auto" style="color:red;"><h6>Level of Expertise:</h6></div>
						<div class="col-md-12 col-xl-auto">
							<select class="custom-select" id="surderExpertise">
								<option selected value="1">Novice Surfer</option>
								<option value="2">Intermediate Surfer</option>
								<option value="3">Expert Surfer</option>
							</select>
						</div>
					</div>
					<div class="row">
						<div class="col-md-12 col-xl-auto"><h6>Max Distance (km):</h6></div>
						<div class="col-md-12 col-xl-auto"><input type="number" class="form-control" id="maxDistance" placeholder="0" value="0" min="0"></div>
					</div>
					<div class="row">
						<div class="col-md-12 col-xl-auto"><h6>Max Driving Time (hr):</h6></div>
						<div class="col-md-12 col-xl-auto"><input type="number" class="form-control" id="maxTime" placeholder="0" value="0" min="0"></div>
		
						<div class="col-md-12 col-xl-auto buttonArea">
							<button class="btn  btn-info" onClick="refresh();" id="refreshBtn"><span class="glyphicon glyphicon-refresh" aria-hidden="true"></span> Refresh</button>
						</div>
					</div>  

				</div>
				<div class="col-xl-6 col-md-12">
					<div class="row"><div class="col-md-12 col-xl-12"><span id="wicon"></span></div></div>
					<div class="row"><div class="col-md-12 col-xl-12"><span id="wdesc1"> </span></div></div>
					<div class="row"><div class="col-md-12 col-xl-12"><span id="wdesc2"> </span></div></div>
				</div>
			</div>


			<div class="row">
					<div id="googlemapSpace"></div>
			</div>
		</div>		

		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>			
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
		<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxAUSEVpNZxxaqucvxmxjQs7rG4W1fZFM&callback=refresh" async defer></script>
		<script src="index.js"></script>		
	</body>
</html>
